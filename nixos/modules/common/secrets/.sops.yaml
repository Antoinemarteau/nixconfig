# .sops.yaml
# the secrets/secrets.yaml content is generated by
# $ (nsp) sops secrets.yaml

keys:
  - &primary_pq_framework 
creation_rules:
  - path_regex: secrets/secrets.yaml$
    key_groups:
    - age:
      - *primary_pq_framework

# How to generate the keys above:
#
# # generate new key at ~/.config/sops/age/keys.txt
# $ nix shell nixpkgs#age -c age-keygen -o ~/.config/sops/age/keys.txt
#
# # generate new key at ~/.config/sops/age/keys.txt from private ssh key at ~/.ssh/private
# $ nix run nixpkgs#ssh-to-age -- -private-key -i ~/.ssh/private > ~/.config/sops/age/keys.txt
#
# # get a public key of ~/.config/sops/age/keys.txt
# nix shell nixpkgs#age -c age-keygen -y ~/.config/sops/age/keys.txt
#
# This public key is what is pasted above in "keys: - &primary...",
# as I failed to generate from ssh (mine has password), I need one for each device
